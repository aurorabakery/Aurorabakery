<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Aurora Bakery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Nunito:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <style>
        body {
            font-family: 'Nunito', sans-serif;
            background-color: #c65b7c;
            color: white;
            min-height: 100vh;
            position: relative;
        }
        .bakery-pattern {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.1;
            background-image: url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ctext y='30' x='15' font-size='22' fill='white' fill-opacity='0.4'%3E🧁%3C/text%3E%3Ctext x='70' y='45' font-size='20' fill='white' fill-opacity='0.4'%3E🥐%3C/text%3E%3Ctext x='25' y='90' font-size='21' fill='white' fill-opacity='0.4'%3E🍰%3C/text%3E%3Ctext x='85' y='20' font-size='18' fill='white' fill-opacity='0.4'%3E🥯%3C/text%3E%3Ctext x='90' y='95' font-size='23' fill='white' fill-opacity='0.4'%3E🍩%3C/text%3E%3C/svg%3E");
            pointer-events: none;
        }
        .serif { font-family: 'DM Serif Display', serif; }
        .mora-bg { background-color: #3d1e26; }
        .crema-text { color: #f7e1d7; }
        .crema-bg { background-color: #f7e1d7; }
        .malva-text { color: #c65b7c; }
        .coral-bg { background-color: #ff4757; }
        [x-cloak] { display: none !important; }

        .custom-card {
            background: rgba(61, 30, 38, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(247, 225, 215, 0.1);
        }
        .table-row-hover:hover {
            background: rgba(247, 225, 215, 0.05);
        }

        /* Estilos para que el modal sea compacto */
        .modal-scroll {
            max-height: 70vh;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #c65b7c transparent;
        }
        .modal-scroll::-webkit-scrollbar { width: 6px; }
        .modal-scroll::-webkit-scrollbar-thumb { background: #c65b7c; border-radius: 10px; }
    </style>
</head>
<body x-data="adminPanel()" x-init="init()">
    <div class="bakery-pattern"></div>

    <nav class="mora-bg border-b border-white/10 backdrop-blur-md sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex items-center justify-between">
            <h1 class="serif text-3xl crema-text">Aurora Admin</h1>
            <div class="flex items-center gap-4">
                <button @click="publishToGitHub()" class="coral-bg text-white px-6 py-2.5 rounded-full font-black text-xs uppercase hover:brightness-110 transition shadow-lg">
                    <i class="fa-solid fa-cloud-arrow-up mr-2"></i> Publicar Cambios
                </button>
                <button @click="logout()" class="text-sm crema-text/60 hover:text-white transition">Salir</button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-10">
        <!-- Ajustes de WhatsApp y Categorías -->
        <div class="custom-card p-6 rounded-3xl mb-10 flex flex-wrap gap-6 items-end shadow-2xl">
            <div class="flex-1 min-w-[250px]">
                <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-2">WhatsApp de Pedidos</label>
                <div class="flex gap-3">
                    <input type="text" x-model="config.phone" class="flex-1 bg-white/5 border border-white/10 rounded-2xl px-5 py-3 text-white focus:outline-none focus:border-[#c65b7c]">
                    <button @click="saveConfig()" class="crema-bg malva-text px-6 py-3 rounded-2xl font-black text-xs uppercase hover:brightness-110 transition">Actualizar</button>
                </div>
            </div>
            <div class="flex-1 min-w-[250px]">
                <p class="text-white/50 text-[10px] uppercase font-black tracking-widest mb-2">Nuevo Producto</p>
                <button @click="openModal('add')" class="w-full coral-bg text-white px-6 py-3 rounded-2xl font-black text-sm uppercase tracking-tighter hover:scale-[1.02] transition shadow-lg">
                    + Agregar Delicia
                </button>
            </div>
        </div>

        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
            <div class="custom-card p-6 rounded-3xl shadow-xl">
                <p class="text-white/50 text-xs uppercase font-bold mb-1">Catálogo Total</p>
                <h3 class="text-4xl font-black crema-text" x-text="products.length">0</h3>
            </div>
            <template x-for="cat in config.categories">
                <div class="custom-card p-6 rounded-3xl shadow-xl border-l-4 border-[#c65b7c]">
                    <p class="text-white/50 text-xs uppercase font-bold mb-1" x-text="cat"></p>
                    <h3 class="text-4xl font-black crema-text" x-text="countCat(cat)">0</h3>
                </div>
            </template>
        </div>

        <!-- Search & Filter -->
        <div class="flex flex-col md:flex-row gap-4 mb-8">
            <div class="relative flex-1">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-1/2 -translate-y-1/2 text-white/30"></i>
                <input type="text" x-model="search" placeholder="Buscar en el horno..." class="w-full bg-white/5 border border-white/10 rounded-2xl pl-12 pr-4 py-4 focus:outline-none focus:border-[#c65b7c] transition">
            </div>
            <select x-model="filterCat" class="bg-[#3d1e26] border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none font-bold">
                <option value="all">Todas las categorías</option>
                <template x-for="cat in config.categories">
                    <option :value="cat" x-text="cat.charAt(0).toUpperCase() + cat.slice(1)"></option>
                </template>
            </select>
        </div>

        <!-- Table -->
        <div class="custom-card rounded-3xl overflow-hidden shadow-2xl">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="mora-bg text-[#f7e1d7] text-[10px] uppercase font-black tracking-widest">
                        <tr>
                            <th class="px-8 py-5">Producto</th>
                            <th class="px-8 py-5">Categoría</th>
                            <th class="px-8 py-5">Precio</th>
                            <th class="px-8 py-5 text-right">Gestión</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-white/5">
                        <template x-for="p in filteredProducts" :key="p.id">
                            <tr class="table-row-hover transition duration-300">
                                <td class="px-8 py-5">
                                    <div class="flex items-center gap-4">
                                        <div class="relative">
                                            <img :src="p.image" class="w-14 h-14 rounded-2xl object-cover bg-white/10 shadow-lg" onerror="this.src='https://placehold.co/100x100?text=🧁'">
                                        </div>
                                        <div>
                                            <div class="font-black text-[#f7e1d7] text-lg" x-text="p.name"></div>
                                            <div class="text-xs text-white/40 truncate max-w-[250px]" x-text="p.desc"></div>
                                        </div>
                                    </div>
                                </td>
                                <td class="px-8 py-5">
                                    <span class="text-[10px] font-black uppercase tracking-widest bg-white/10 px-3 py-1 rounded-full text-white/70" x-text="p.cat"></span>
                                </td>
                                <td class="px-8 py-5">
                                    <div class="font-black text-xl crema-text">RD$ <span x-text="Number(p.price).toLocaleString()"></span></div>
                                </td>
                                <td class="px-8 py-5 text-right">
                                    <div class="flex justify-end gap-3">
                                        <button @click="openModal('edit', p)" class="w-10 h-10 flex items-center justify-center bg-blue-500/20 text-blue-400 rounded-xl hover:bg-blue-500 hover:text-white transition shadow-sm"><i class="fa-solid fa-pen-to-square"></i></button>
                                        <button @click="deleteProduct(p.id)" class="w-10 h-10 flex items-center justify-center bg-red-500/20 text-red-400 rounded-xl hover:bg-red-500 hover:text-white transition shadow-sm"><i class="fa-solid fa-trash-can"></i></button>
                                    </div>
                                </td>
                            </tr>
                        </template>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal Producto -->
    <div x-show="showModal" class="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-[#3d1e26]/90 backdrop-blur-md" x-cloak x-transition>
        <div @click.away="showModal = false" class="mora-bg border border-white/10 w-full max-w-2xl rounded-[2.5rem] overflow-hidden shadow-2xl">
            <div class="p-6 border-b border-white/5 flex justify-between items-center">
                <h2 class="serif text-2xl crema-text" x-text="editMode ? 'Perfeccionar Receta' : 'Nueva Creación'"></h2>
                <button @click="showModal = false" class="text-white/30 hover:text-white text-2xl transition">&times;</button>
            </div>

            <form @submit.prevent="saveProduct()">
                <div class="p-6 modal-scroll grid grid-cols-2 gap-4">
                    <div class="col-span-2">
                        <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-1">Nombre del Postre</label>
                        <input type="text" x-model="form.name" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#c65b7c]">
                    </div>
                    <div>
                        <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-1">Categoría</label>
                        <select x-model="form.cat" @change="checkNewCat($event)" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none">
                            <template x-for="cat in config.categories">
                                <option :value="cat" x-text="cat.charAt(0).toUpperCase() + cat.slice(1)"></option>
                            </template>
                            <option value="NEW" class="text-[#c65b7c] font-black">+ Nueva Categoría</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-1">Precio Base (RD$)</label>
                        <input type="number" x-model="form.price" required class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none focus:border-[#c65b7c]">
                    </div>
                    <div class="col-span-2">
                        <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-1">Imagen (URL o Subir)</label>
                        <div class="grid grid-cols-2 gap-3">
                            <input type="text" x-model="form.image" placeholder="URL..." class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-xs text-white focus:outline-none">
                            <div class="relative">
                                <input type="file" @change="handleFileUpload($event)" accept="image/*" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                <div class="w-full bg-white/10 border border-dashed border-white/20 rounded-xl px-4 py-3 text-center text-[10px] text-white/60">
                                    <i class="fa-solid fa-camera mr-1"></i> Subir Foto
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-span-2 p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-white/50 text-[10px] uppercase font-black tracking-widest">Variantes (Tamaños)</label>
                            <button type="button" @click="addVariant()" class="text-[9px] bg-[#c65b7c] px-3 py-1 rounded-full font-bold uppercase tracking-tighter hover:scale-105 transition">+ Añadir</button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(v, index) in form.variants" :key="index">
                                <div class="flex gap-2 items-center">
                                    <input type="text" x-model="v.name" placeholder="Ej: 10 pulg" class="flex-1 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-[11px] text-white">
                                    <input type="number" x-model="v.price" placeholder="Precio" class="w-20 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-[11px] text-white">
                                    <button type="button" @click="removeVariant(index)" class="text-red-400 p-1"><i class="fa-solid fa-times text-xs"></i></button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="col-span-2 p-4 bg-white/5 rounded-2xl border border-white/5 space-y-3">
                        <div class="flex justify-between items-center">
                            <label class="text-white/50 text-[10px] uppercase font-black tracking-widest">Sabores (Extras)</label>
                            <button type="button" @click="addOption()" class="text-[9px] bg-[#c65b7c] px-3 py-1 rounded-full font-bold uppercase tracking-tighter hover:scale-105 transition">+ Añadir</button>
                        </div>
                        <div class="space-y-2">
                            <template x-for="(opt, index) in form.options" :key="index">
                                <div class="flex gap-2 items-center">
                                    <input type="text" x-model="opt.name" placeholder="Sabor" class="flex-1 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-[11px] text-white">
                                    <input type="number" x-model="opt.price" placeholder="+RD$" class="w-20 bg-white/10 border border-white/10 rounded-lg px-3 py-2 text-[11px] text-white">
                                    <button type="button" @click="removeOption(index)" class="text-red-400 p-1"><i class="fa-solid fa-times text-xs"></i></button>
                                </div>
                            </template>
                        </div>
                    </div>

                    <div class="col-span-2">
                        <label class="block text-white/50 text-[10px] uppercase font-black tracking-widest mb-1">Descripción</label>
                        <textarea x-model="form.desc" rows="2" class="w-full bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white focus:outline-none"></textarea>
                    </div>
                </div>

                <div class="p-6 bg-white/5 flex gap-3">
                    <button type="button" @click="showModal = false" class="flex-1 py-3 border border-white/10 rounded-xl hover:bg-white/5 transition uppercase text-[10px] font-black">Cerrar</button>
                    <button type="submit" class="flex-1 py-3 coral-bg text-white rounded-xl hover:brightness-110 transition uppercase text-[10px] font-black shadow-lg">Guardar Receta</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Toast -->
    <div x-show="toast.show" x-transition x-cloak class="fixed bottom-10 right-10 mora-bg text-[#f7e1d7] px-8 py-5 rounded-3xl shadow-2xl flex items-center gap-4 z-[200] border border-white/10">
        <div class="bg-green-500 text-white w-10 h-10 rounded-full flex items-center justify-center shadow-lg"><i class="fa-solid fa-check"></i></div>
        <div>
            <p class="font-black text-sm uppercase tracking-wider" x-text="toast.title"></p>
            <p class="text-xs text-white/60" x-text="toast.msg"></p>
        </div>
    </div>

    <!-- Importar datos por defecto -->
    <script src="../js/data.js"></script>
    <script src="admin-logic.js"></script>
</body>
</html>
